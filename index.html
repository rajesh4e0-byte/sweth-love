<!DOCTYPE html>

<html>
<head>
  <title>For Sweth ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      text-align:center; 
      font-family:sans-serif; 
      background:#ff7eb3; 
      color:white; 
      margin:0;
      overflow:hidden;
    }
    h1 { margin-top:100px; }
    button { 
      padding:12px 20px; 
      margin:10px; 
      border:none; 
      border-radius:10px; 
      cursor:pointer;
    }
    #yes { background:#ff2e63; color:white; }
    #no { position:absolute; }
  </style>
</head>
<body>

<h1>Sweth 💖<br><br>Will you be mine forever? 💙</h1>

<button id="yes" onclick="yesClicked()">Yes 💖</button> <button id="no" onmouseover="moveNo()">No 😢</button>

<script>
function yesClicked() {
  document.body.innerHTML = `
  <div style="position:relative; height:100vh; width:100vw;">

    <img src="/sweth-love/sweth.jpg"
         style="position:absolute; left:0; top:0; width:50%; height:100%; object-fit:cover;">

    <img src="/sweth-love/raju.jpg"
         style="position:absolute; right:0; top:0; width:50%; height:100%; object-fit:cover;">

    <div style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      color:white;
      background:rgba(0,0,0,0.5);
backdrop-filter: blur(8px);
box-shadow: 0 0 20px rgba(255,255,255,0.3);
      padding:20px;
      border-radius:12px;
    ">
      <h1>
        You're my world ma 💙<br><br>
        Love you forever Sweth ❤️<br>
        - Rajuuu 😘
      </h1>
    </div>

  </div>`;
}

function moveNo() {
  let x = Math.random()*window.innerWidth;
  let y = Math.random()*window.innerHeight;
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}
</script>

</body>
</html>
