<!DOCTYPE html>

<html>
<head>
  <title>For Sweth ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { 
      text-align:center; 
      font-family:sans-serif; 
      margin:0;
      overflow:hidden;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color:white;
    }

    h1 { 
      margin-top:90px; 
      font-size:28px;
      line-height:1.6;
      padding:0 20px;
    }

    button { 
      padding:12px 25px; 
      margin:15px; 
      border:none; 
      border-radius:12px; 
      cursor:pointer;
      font-size:16px;
    }

    #yes { 
      background:#ff2e63; 
      color:white;
      box-shadow:0 0 15px #ff2e63;
    }

    #no { 
      position:absolute; 
      background:white;
      color:black;
    }

    .heart {
      position:absolute;
      color:red;
      animation:float 5s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity:1; }
      to { transform: translateY(-10vh); opacity:0; }
    }

    .photo {
      animation: zoom 12s infinite alternate;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
  </style>

</head>

<body>

<h1>
  It’s been just one week… 💖<br><br>

but every moment with you<br>
already feels so special ✨<br><br>

I’m really lucky to have you 💙

</h1>

<button id="yes" onclick="yesClicked()">Continue 💖</button> <button id="no" onmouseover="moveNo()">No 😢</button>

<script>

startHearts();

function yesClicked() {

  document.body.innerHTML = `
  <div style="position:relative; height:100vh; width:100vw; overflow:hidden;">

    <img src="/sweth-love/sweth.jpg"
         class="photo"
         style="position:absolute; left:0; top:0; width:50%; height:100%; object-fit:cover;">

    <img src="/sweth-love/raju.jpg"
         class="photo"
         style="position:absolute; right:0; top:0; width:50%; height:100%; object-fit:cover;">

    <!-- overlay -->
    <div style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.3);
    "></div>

    <!-- message -->
    <div style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      color:white;

      background:rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);

      padding:20px;
      border-radius:20px;

      box-shadow:0 0 25px rgba(0,0,0,0.3);

      max-width:90%;
      max-height:80vh;
      overflow:auto;
    ">
      <h1 style="
        line-height:1.7;
        font-size: clamp(18px, 2.5vw, 24px);
      ">
        Happy 1 Week Anniversary 💖<br><br>

        It’s just been a short time,<br>
        but you’ve already become<br>
        such an important part of my life 💫<br><br>

        Being with you feels peaceful,<br>
        simple… and truly happy 💙<br><br>

        Nuv nannu “nana” ani pilichinappudu…<br>
        naaku oka special feeling vastundi 💖<br><br>

        And I’m really grateful for you 💙<br><br>

        Love you so much, Sweth 💖<br><br>

        - Always yours, Rajuuu 😘
      </h1>
    </div>

  </div>

  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>
  `;

  startHearts();
}

function moveNo() {
  let x = Math.random()*window.innerWidth;
  let y = Math.random()*window.innerHeight;
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

</script>

</body>
</html>
