<!DOCTYPE html>

<html>
<head>
  <title>For Sweth ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { 
      text-align:center; 
      font-family:sans-serif; 
      margin:0;
      overflow:hidden;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color:white;
    }

    h1 { 
      margin-top:80px; 
      font-size:28px;
      line-height:1.6;
      padding:0 20px;
    }

    button { 
      padding:12px 25px; 
      margin:15px; 
      border:none; 
      border-radius:12px; 
      cursor:pointer;
      font-size:16px;
    }

    #yes { 
      background:#ff2e63; 
      color:white;
      box-shadow:0 0 15px #ff2e63;
    }

    #no { 
      position:absolute; 
      background:white;
      color:black;
    }

    /* floating hearts */
    .heart {
      position:absolute;
      color:red;
      animation:float 5s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity:1; }
      to { transform: translateY(-10vh); opacity:0; }
    }

    /* zoom effect */
    .photo {
      animation: zoom 12s infinite alternate;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
  </style>

</head>

<body>

<h1>
  Happy 1 Week Anniversary 💖<br><br>

From strangers…<br>
to something so special 💫<br><br>

Every moment with you<br>
feels like magic ✨<br><br>

Will you be mine forever? 💙

</h1>

<button id="yes" onclick="yesClicked()">Yes 💖</button> <button id="no" onmouseover="moveNo()">No 😢</button>

<script>

startHearts();

function yesClicked() {

  document.body.innerHTML = `
  <div style="position:relative; height:100vh; width:100vw; overflow:hidden;">

    <!-- Left Photo -->
    <img src="/sweth-love/sweth.jpg"
         class="photo"
         style="position:absolute; left:0; top:0; width:50%; height:100%; object-fit:cover;">

    <!-- Right Photo -->
    <img src="/sweth-love/raju.jpg"
         class="photo"
         style="position:absolute; right:0; top:0; width:50%; height:100%; object-fit:cover;">

    <!-- Dark overlay -->
    <div style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.35);
    "></div>

    <!-- Message Box -->
    <div style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      color:white;

      background:rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);

      padding:30px;
      border-radius:20px;

      box-shadow:0 0 30px rgba(255,255,255,0.3);
      border:1px solid rgba(255,255,255,0.2);

      max-width:85%;
    ">
      <h1 style="line-height:1.7;">
        Happy 1 Week Anniversary 💖<br><br>

        It’s just been one week…<br>
        but it already feels like<br>
        you’re a part of my world 🌍<br><br>

        Every smile of yours<br>
        means everything to me 💫<br><br>

        You're not just special…<br>
        you're my peace, my happiness 💙<br><br>

        Love you forever Sweth ❤️<br><br>

        Nuvvu naa life lo vachaka antha maripoyindhi 💖<br><br>

        - Yours Rajuuu 😘
      </h1>
    </div>

  </div>

  <!-- Music -->
  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>
  `;

  startHearts();
}

function moveNo() {
  let x = Math.random()*window.innerWidth;
  let y = Math.random()*window.innerHeight;
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

</script>

</body>
</html>
