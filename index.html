<!DOCTYPE html>

<html>
<head>
  <title>For Sweth ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { 
      text-align:center; 
      font-family:sans-serif; 
      margin:0;
      overflow:hidden;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color:white;
    }

    h1 { 
      margin-top:100px; 
      font-size:30px;
      line-height:1.5;
    }

    button { 
      padding:12px 25px; 
      margin:15px; 
      border:none; 
      border-radius:12px; 
      cursor:pointer;
      font-size:16px;
    }

    #yes { 
      background:#ff2e63; 
      color:white;
      box-shadow:0 0 15px #ff2e63;
    }

    #no { 
      position:absolute; 
      background:white;
      color:black;
    }

    .heart {
      position:absolute;
      color:red;
      animation:float 5s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity:1; }
      to { transform: translateY(-10vh); opacity:0; }
    }
  </style>

</head>

<body>

<h1>
  Happy 1 Week Anniversary 💖<br><br>
  Sweth ❤️<br><br>
  Will you be mine forever? 💙
</h1>

<button id="yes" onclick="yesClicked()">Yes 💖</button> <button id="no" onmouseover="moveNo()">No 😢</button>

<script>

startHearts();

function yesClicked() {

  document.body.innerHTML = `
  <div style="position:relative; height:100vh; width:100vw; overflow:hidden;">

    <img src="/sweth-love/sweth.jpg"
         style="position:absolute; left:0; top:0; width:50%; height:100%; object-fit:cover;">

    <img src="/sweth-love/raju.jpg"
         style="position:absolute; right:0; top:0; width:50%; height:100%; object-fit:cover;">

    <div style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      color:white;

      background:rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);

      padding:30px;
      border-radius:20px;

      box-shadow:0 0 30px rgba(255,255,255,0.3);
      border:1px solid rgba(255,255,255,0.2);

      max-width:80%;
    ">
      <h1 style="line-height:1.6;">
        Happy 1 Week Anniversary 💖<br><br>

        From that first day till now…<br>
        every moment with you feels special ✨<br><br>

        You're my world ma 💙<br>
        Love you forever Sweth ❤️<br><br>

        Nuvvu naa life lo vachaka antha maripoyindhi 💖<br><br>

        - Yours Rajuuu 😘
      </h1>
    </div>

  </div>

  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>
  `;

  startHearts();
}

function moveNo() {
  let x = Math.random()*window.innerWidth;
  let y = Math.random()*window.innerHeight;
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

</script>

</body>
</html>
